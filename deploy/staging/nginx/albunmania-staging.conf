server {
    listen 80;
    listen [::]:80;
    server_name albunmania.projectapp.co;

    # Let certbot answer the ACME challenge; everything else redirects.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name albunmania.projectapp.co;

    # certbot fills these once issued; the runbook calls
    # `sudo certbot --nginx -d albunmania.projectapp.co` to inject them.
    # ssl_certificate /etc/letsencrypt/live/albunmania.projectapp.co/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/albunmania.projectapp.co/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 25M;

    # Security headers (mirror Django's SECURE_* settings — defense in depth).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Backend: Django via gunicorn unix socket.
    location /api/ {
        proxy_pass http://unix:/run/albunmania_staging.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Django admin + DRF browsable API.
    location ~ ^/(admin|admin-gallery|silk)/ {
        proxy_pass http://unix:/run/albunmania_staging.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django collected static + user media (served directly by nginx).
    location /static/ {
        alias /home/ryzepeck/webapps/albunmania_staging/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/ryzepeck/webapps/albunmania_staging/backend/media/;
        access_log off;
        expires 7d;
    }

    # Service Worker MUST be served from /sw.js with no Service-Worker-Allowed
    # header restriction so its scope can be the entire origin.
    location = /sw.js {
        alias /home/ryzepeck/webapps/albunmania_staging/frontend/.next/static/sw.js;
        try_files $uri /_next/static/sw.js;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    # Frontend: Next.js standalone server (or `npm start`).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
